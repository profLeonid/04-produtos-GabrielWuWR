<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            font-family: comic sans ms;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script defer src="./script.js"></script>
    <title>Produtos</title>
</head>

<body class="bg-gray-200 flex justify-center flex-col items-center gap-5 h-screen">
    <h1 class="text-2xl border-b-3 py-2 px-14 border-blue-500">Lista Produtos</h1>
    <input placeholder="Digite o nome um produto" class="border-2 rounded-2xl px-12 py-2 flex border-blue-500" id="produto" type="text">
    <button class="bg-blue-500 text-white px-4 py-2 rounded-2xl hover:cursor-pointer hover:bg-blue-600"
        onclick="adicionarProduto()">
        Adicionar
    </button>

    <div id="lista" class="flex flex-col gap-2">

    </div>

</html>
